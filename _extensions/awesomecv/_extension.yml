title: quarto-awesomecv-typst
author: Emma Marsall
version: 0.3.2
description: |
  Modified version of {quarto-awesomecv-typse} extension for including APA7 publications and styling for academic cv
quarto-required: ">=1.8.0"
contributes:
  formats:
    typst:
      shortcodes:
        - input-yaml.lua
      filters:
        - apa-cv-filter.lua
        - bold-author.lua
        - apa-bib-section.lua
      template-partials:
        - typst-template.typ
        - typst-show.typ


